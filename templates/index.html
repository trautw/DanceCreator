<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GUI mit Resizable Bereichen</title>
    <!-- Einbinden von CSS aus dem static-Ordner -->
    <link rel="stylesheet" href="../static/Dance_Creator.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jstree@3.3.12/dist/themes/default/style.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jstree@3.3.12/dist/jstree.min.js"></script>

    <!-- kleine Auswahl-Styles für Karten -->
    <style>
      .card.selected {
        background: #f0f7ff;
        border-color: #9ec5ff;
        box-shadow: 0 0 0 2px rgba(158,197,255,0.15);
      }
      .card:hover { cursor: pointer; }
    </style>

</head>
<body>
  <div id="header">
    <div id="header-left">
        <div id="file-path">Pfad: /path/to/current/file.dc</div>
    </div>
    <div id="header-center">
        <h2>Dance Creator</h2>
    </div>
    <div id="header-right">
        <button id="btn-load">Load</button>
        <button id="btn-save">Save</button>
    </div>
  </div>
<!-- Grundsätzlicher Aufbau -->
  <div id="container">
    <div id="left" class="panel">
      <h3>Figuren</h3>
      <!-- Suchfeld -->
      <input type="text" id="search" placeholder="Suche nach Name..." style="width: 100%; margin-bottom: 10px;">

      <label for="filter">Filter (Formation):</label>
      <select id="filter">
          <option value="">Alle Formationen</option>
      </select>
        <div id="figure-list"></div>
    </div>

    <div class="splitter" id="splitter-left"></div>
    <div id="middle" class="panel">
      <h3>Arbeitsbereich</h3>
    </div>
    <div class="splitter" id="splitter-right"></div>
    <div id="right" class="panel">
      <h3>Dancestruktur</h3>
      <div id="treeview"></div>
    </div>
  </div>

  <script>
          <!-- *************************** -->
          <!-- *** Splitter funktionen *** -->
          <!-- *************************** -->

    function makeSplitter(splitterId, leftPanelId, rightPanelId) {
      const splitter = document.getElementById(splitterId);
      const leftPanel = document.getElementById(leftPanelId);
      const rightPanel = document.getElementById(rightPanelId);

      splitter.addEventListener('mousedown', function(e) {
        e.preventDefault();
        document.addEventListener('mousemove', resize);
        document.addEventListener('mouseup', stopResize);
      });

      function resize(e) {
        const totalWidth = splitter.parentNode.offsetWidth;
        const leftWidth = e.clientX;
        const rightWidth = totalWidth - leftWidth - 10; // 10 = 2 splitters width

        if (leftWidth > 100 && rightWidth > 100) {
          leftPanel.style.width = leftWidth + 'px';
          rightPanel.style.width = rightWidth + 'px';
        }
      }

      function stopResize() {
        document.removeEventListener('mousemove', resize);
        document.removeEventListener('mouseup', stopResize);
      }
    }

    makeSplitter('splitter-left', 'left', 'middle');
    makeSplitter('splitter-right', 'middle', 'right');
  </script>



  <script>
// Verstecktes File-Input erzeugen

          <!-- ******************** -->
          <!-- *** Laden Button *** -->
          <!-- ******************** -->

const fileInput = document.createElement('input');
fileInput.type = 'file';
fileInput.accept = '.json';
fileInput.style.display = 'none';
fileInput.webkitdirectory = false;
document.body.appendChild(fileInput);

// Load-Button klick → Datei-Auswahl
document.getElementById('btn-load').addEventListener('click', () => {
    fileInput.click();
});

// Wenn Datei gewählt → an /tree senden
fileInput.addEventListener('change', () => {
    if (!fileInput.files.length) return;

    const file = fileInput.files[0];
    const fileName = file.name;

    // jsTree mit neuer Datei laden
    reloadTreeFromFile(fileName);
});

// Funktion zum Neuladen des Trees
function reloadTreeFromFile(fileName) {
    $('#treeview').jstree(true).settings.core.data = {
        url: `/tree?file=${fileName}`,
        dataType: 'json'
    };
    $('#treeview').jstree(true).refresh();
}
</script>


<script>
          <!-- *********************** -->
          <!-- *** Tree funktionen *** -->
          <!-- *********************** -->

$(function() {
  $('#treeview').jstree({
    'core': {
      'data': [
        { "text": "Dance", "id": "dance-node" }
      ]
    }
  });
});
</script>

<script>
function loadFigures() {
    // Lade Figuren und baue kompakte Karten (nur Name / Desc / Bars)
    fetch('/figures')
        .then(response => response.json())
        .then(data => {
            if (typeof populateFormationOptions === 'function') populateFormationOptions(data);

            const container = document.getElementById('figure-list');
            container.innerHTML = '';

            data.forEach(fig => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.alignItems = 'flex-start';

                // Formation als dataset (für Filter)
                const formation = fig.Formation || fig.formation || fig.formationType || fig.formation_name || '';
                card.dataset.formation = formation.toString().toLowerCase();

                // Volle Daten sichern
                card.dataset.full = JSON.stringify(fig);

                // Linker Bereich: Name + Description
                const left = document.createElement('div');
                left.className = 'left';
                left.style.overflow = 'visible';
                left.style.minWidth = '0';

                const nameStrong = document.createElement('strong');
                nameStrong.textContent = fig.name || fig.Name || 'Unnamed';
                nameStrong.style.display = 'block';

                const descVisible = document.createElement('p');
                descVisible.textContent = fig.desc || fig.Description || fig.Desc || fig.description || '';
                descVisible.style.display = 'block';
                descVisible.style.margin = '4px 0 0 0';
                descVisible.style.color = '#444';
                descVisible.style.fontSize = '0.9rem';
                descVisible.style.lineHeight = '1.2';
                descVisible.style.overflow = 'visible';
                descVisible.style.maxHeight = 'none';
                descVisible.style.whiteSpace = 'normal';
                descVisible.style.textOverflow = 'clip';

                left.appendChild(nameStrong);
                left.appendChild(descVisible);

                // Rechter Bereich: Bars
                const barsVal = (fig.Bars ?? fig.bars ?? fig.barsCount ?? fig.BarsCount ?? fig.bar ?? fig.Bar);
                const barsText = (barsVal === undefined || barsVal === null || barsVal === '') ? '—' : barsVal;
                const barsDiv = document.createElement('div');
                barsDiv.className = 'bars';
                barsDiv.textContent = 'Bars: ' + barsText;

                card.appendChild(left);
                card.appendChild(barsDiv);

                // Klick-Handler: zeige vollständige Infos im Arbeitsbereich
                card.addEventListener('click', function() {
                    // markiere Auswahl
                    document.querySelectorAll('#figure-list .card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    // zeige Details
                    displayFigureDetails(fig);
                });

                container.appendChild(card);
            });

            if (typeof applyFilters === 'function') applyFilters();
        })
        .catch(err => console.error('Fehler beim Laden der Figuren:', err));
}

// Hilfsfunktion: zeigt alle bekannten Informationen einer Figur im Arbeitsbereich an
function displayFigureDetails(fig) {
    const middle = document.getElementById('middle');
    // Überschreibe Inhalt, lasse Überschrift bestehen
    middle.innerHTML = '<h3>Arbeitsbereich</h3>';

    const wrapper = document.createElement('div');
    wrapper.style.padding = '8px';

    // Titel / Name
    const title = document.createElement('h4');
    title.textContent = fig.name || fig.Name || 'Unnamed';
    wrapper.appendChild(title);

    // Description
    const desc = document.createElement('p');
    desc.textContent = fig.desc || fig.Description || fig.Desc || fig.description || '';
    desc.style.marginTop = '6px';
    desc.style.color = '#333';
    wrapper.appendChild(desc);

    // Meta-Liste (Formation, Bars)
    const metaList = document.createElement('ul');
    metaList.style.paddingLeft = '18px';
    metaList.style.marginTop = '8px';

    const formationLi = document.createElement('li');
    formationLi.textContent = 'Formation: ' + (fig.Formation || fig.formation || fig.formationType || fig.formation_name || '—');
    metaList.appendChild(formationLi);

    const barsLi = document.createElement('li');
    const barsVal = (fig.Bars ?? fig.bars ?? fig.barsCount ?? fig.BarsCount ?? fig.bar ?? fig.Bar);
    barsLi.textContent = 'Bars: ' + ((barsVal === undefined || barsVal === null || barsVal === '') ? '—' : barsVal);
    metaList.appendChild(barsLi);

    wrapper.appendChild(metaList);

    // Tabelle mit allen Feldern
    const table = document.createElement('table');
    table.style.width = '100%';
    table.style.borderCollapse = 'collapse';
    table.style.marginTop = '10px';

    Object.keys(fig).forEach(key => {
        const tr = document.createElement('tr');
        const tdKey = document.createElement('td');
        tdKey.textContent = key;
        tdKey.style.width = '30%';
        tdKey.style.padding = '4px 8px';
        tdKey.style.fontWeight = '600';
        tdKey.style.verticalAlign = 'top';

        const tdVal = document.createElement('td');
        let val = fig[key];
        if (typeof val === 'object') {
            try { val = JSON.stringify(val); } catch (e) { val = String(val); }
        }
        tdVal.textContent = val === undefined || val === null ? '' : String(val);
        tdVal.style.padding = '4px 8px';
        tdVal.style.color = '#222';

        tr.appendChild(tdKey);
        tr.appendChild(tdVal);
        table.appendChild(tr);
    });

    wrapper.appendChild(table);

    // Vollständiges JSON (ausklappbar)
    const pre = document.createElement('pre');
    pre.textContent = JSON.stringify(fig, null, 2);
    pre.style.background = '#f7f7f7';
    pre.style.padding = '8px';
    pre.style.borderRadius = '4px';
    pre.style.marginTop = '10px';
    pre.style.maxHeight = '240px';
    pre.style.overflow = 'auto';

    wrapper.appendChild(pre);

    middle.appendChild(wrapper);
}

// automatische Befüllung des Formation-Filters (wird von loadFigures aufgerufen)
function populateFormationOptions(data) {
    const select = document.getElementById('filter');
    if (!select) return;

    // Merke aktuellen Wert, damit wir ihn nach dem Neuaufbau wieder setzen können
    const previous = select.value || '';

    // Sammle eindeutige Formation-Werte in Originalschreibweise
    const formationsMap = new Map();
    data.forEach(fig => {
        const val = fig.Formation || fig.formation || fig.formationType || fig.formation_name || '';
        if (val && typeof val === 'string') {
            const key = val.toString().toLowerCase();
            if (!formationsMap.has(key)) formationsMap.set(key, val);
        }
    });

    // Entferne alte Options außer der ersten (Alle Formationen)
    while (select.options.length > 1) select.remove(1);

    // Füge gefundene Optionen sortiert hinzu
    Array.from(formationsMap.entries())
         .sort((a,b) => a[1].localeCompare(b[1]))
         .forEach(([key, original]) => {
             const opt = document.createElement('option');
             opt.value = key;
             opt.textContent = original;
             select.appendChild(opt);
         });

    // Wenn die vorher gewählte Option noch existiert, stelle sie wieder her
    if (previous) {
        const found = Array.from(select.options).some(o => o.value === previous.toString().toLowerCase());
        if (found) {
            select.value = previous.toString().toLowerCase();
        } else {
            // falls nicht vorhanden, setze auf Alle
            select.value = '';
        }
    }

    // Filter aktualisieren
    if (typeof applyFilters === 'function') applyFilters();
}

// Filter- und Suchfunktion: wendet den ausgewählten Formation-Filter und Suche auf die Cards an
function applyFilters() {
    const filterEl = document.getElementById('filter');
    const searchEl = document.getElementById('search');
    const sel = filterEl ? (filterEl.value || '').toString().toLowerCase() : '';
    const text = searchEl ? (searchEl.value || '').toString().toLowerCase() : '';

    const cards = document.querySelectorAll('#figure-list .card');
    cards.forEach(card => {
        const cardFormation = (card.dataset.formation || '').toString().toLowerCase();
        const matchesFormation = !sel || sel === cardFormation;

        const nameEl = card.querySelector('strong');
        const nameText = nameEl ? (nameEl.textContent || '').toString().toLowerCase() : '';
        const matchesText = !text || nameText.includes(text);

        const show = matchesFormation && matchesText;
        card.style.display = show ? 'flex' : 'none';
    });
}

// Registriere Event-Listener für Filter und Suche
(function registerFilterListeners(){
    const filterEl = document.getElementById('filter');
    if (filterEl) {
        filterEl.addEventListener('change', applyFilters);
        filterEl.addEventListener('input', applyFilters);
    }
    const searchEl = document.getElementById('search');
    if (searchEl) searchEl.addEventListener('input', applyFilters);

    // wende aktuellen Filter sofort an (falls schon gesetzt)
    if (typeof applyFilters === 'function') applyFilters();
})();

// Figuren direkt beim Start laden
document.addEventListener('DOMContentLoaded', loadFigures);
</script>

</body>
</html>
