<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GUI mit Resizable Bereichen</title>
    <!-- Einbinden von CSS aus dem static-Ordner -->
    <link rel="stylesheet" href="../static/Dance_Creator.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jstree@3.3.12/dist/themes/default/style.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jstree@3.3.12/dist/jstree.min.js"></script>

    <!-- kleine Auswahl-Styles für Karten -->
    <style>
      .card.selected {
        background: #f0f7ff;
        border-color: #9ec5ff;
        box-shadow: 0 0 0 2px rgba(158,197,255,0.15);
      }
      .card:hover { cursor: pointer; }
    </style>

</head>
<body>
  <div id="header">
    <div id="header-left">
        <div id="file-path">Pfad: /path/to/current/file.dc</div>
    </div>
    <div id="header-center">
        <h2>Dance Creator</h2>
    </div>
    <div id="header-right">
        <button id="btn-load">Load</button>
        <button id="btn-save">Save</button>
    </div>
  </div>
<!-- Grundsätzlicher Aufbau -->
  <div id="container">
    <div id="left" class="panel">
      <h3>Figuren</h3>
      <!-- Suchfeld -->
      <input type="text" id="search" placeholder="Suche nach Name..." style="width: 100%; margin-bottom: 10px;">

      <label for="filter">Filter (Formation):</label>
      <select id="filter">
          <option value="">Alle Formationen</option>
      </select>
        <div id="figure-list"></div>
    </div>

    <div class="splitter" id="splitter-left"></div>
    <div id="middle" class="panel">
      <h3>Arbeitsbereich</h3>
    </div>
    <div class="splitter" id="splitter-right"></div>
    <div id="right" class="panel">
      <h3>Dancestruktur</h3>
      <div id="treeview"></div>
    </div>
  </div>

  <script>
          <!-- *************************** -->
          <!-- *** Splitter funktionen *** -->
          <!-- *************************** -->

    function makeSplitter(splitterId, leftPanelId, rightPanelId) {
      const splitter = document.getElementById(splitterId);
      const leftPanel = document.getElementById(leftPanelId);
      const rightPanel = document.getElementById(rightPanelId);

      splitter.addEventListener('mousedown', function(e) {
        e.preventDefault();
        document.addEventListener('mousemove', resize);
        document.addEventListener('mouseup', stopResize);
      });

      function resize(e) {
        const totalWidth = splitter.parentNode.offsetWidth;
        const leftWidth = e.clientX;
        const rightWidth = totalWidth - leftWidth - 10; // 10 = 2 splitters width

        if (leftWidth > 100 && rightWidth > 100) {
          leftPanel.style.width = leftWidth + 'px';
          rightPanel.style.width = rightWidth + 'px';
        }
      }

      function stopResize() {
        document.removeEventListener('mousemove', resize);
        document.removeEventListener('mouseup', stopResize);
      }
    }

    makeSplitter('splitter-left', 'left', 'middle');
    makeSplitter('splitter-right', 'middle', 'right');
  </script>



  <script>
// Verstecktes File-Input erzeugen

          <!-- ******************** -->
          <!-- *** Laden Button *** -->
          <!-- ******************** -->

const fileInput = document.createElement('input');
fileInput.type = 'file';
fileInput.accept = '.json';
fileInput.style.display = 'none';
fileInput.webkitdirectory = false;
document.body.appendChild(fileInput);

// Load-Button klick → Datei-Auswahl
document.getElementById('btn-load').addEventListener('click', () => {
    // Anfrage an Backend: liste der Dance .json Dateien im DANCES_DIR
    fetch('/dances')
        .then(res => res.json())
        .then(list => {
            if (!list || !Array.isArray(list) || list.length === 0) {
                alert('Keine Dance-Dateien auf dem Server gefunden.');
                return;
            }
            showDanceSelectionModal(list);
        })
        .catch(err => {
            console.error('Fehler beim Abfragen der Dance-Liste:', err);
            alert('Fehler beim Abfragen der Dance-Liste');
        });
});

// Einfaches Modal zur Auswahl einer Datei aus dem Server-Verzeichnis
function showDanceSelectionModal(files) {
    const overlay = document.createElement('div');
    overlay.style.position = 'fixed'; overlay.style.left = 0; overlay.style.top = 0;
    overlay.style.right = 0; overlay.style.bottom = 0; overlay.style.background = 'rgba(0,0,0,0.4)';
    overlay.style.zIndex = 10000;

    const box = document.createElement('div');
    box.style.width = '480px'; box.style.maxWidth = '90%'; box.style.margin = '12vh auto';
    box.style.background = '#fff'; box.style.borderRadius = '6px'; box.style.padding = '12px';
    box.style.boxShadow = '0 8px 24px rgba(0,0,0,0.2)';

    const title = document.createElement('h4'); title.textContent = 'Dance-Datei wählen'; title.style.margin = '0 0 8px 0';
    box.appendChild(title);

    const select = document.createElement('select'); select.style.width = '100%'; select.style.padding = '6px';
    files.forEach(f => { const opt = document.createElement('option'); opt.value = f; opt.textContent = f; select.appendChild(opt); });
    box.appendChild(select);

    const btnRow = document.createElement('div'); btnRow.style.display = 'flex'; btnRow.style.justifyContent = 'flex-end'; btnRow.style.gap = '8px'; btnRow.style.marginTop = '10px';
    const btnCancel = document.createElement('button'); btnCancel.textContent = 'Abbrechen'; btnCancel.style.padding = '6px 10px';
    btnCancel.addEventListener('click', () => document.body.removeChild(overlay));
    const btnOk = document.createElement('button'); btnOk.textContent = 'Laden'; btnOk.style.padding = '6px 10px';
    btnOk.addEventListener('click', () => { const chosen = select.value; if (chosen) reloadTreeFromFile(chosen); document.body.removeChild(overlay); });
    btnRow.appendChild(btnCancel); btnRow.appendChild(btnOk); box.appendChild(btnRow);

    overlay.appendChild(box); document.body.appendChild(overlay); select.focus();
}

// Wenn Datei gewählt → an /tree senden
fileInput.addEventListener('change', () => {
    if (!fileInput.files.length) return;

    const file = fileInput.files[0];
    const fileName = file.name;

    // jsTree mit neuer Datei laden
    reloadTreeFromFile(fileName);
});

// Funktion zum Neuladen des Trees
function reloadTreeFromFile(fileName) {
    // Hole die flache Knotenliste vom Backend und mappe sie in jsTree-Format
    fetch(`/tree?file=${encodeURIComponent(fileName)}`)
        .then(res => res.json())
        .then(nodes => {
            // nodes erwartet eine Liste von Objekten, evtl. mit 'id', 'parent_id', 'name'/'text', 'meta'
            const jsNodes = (Array.isArray(nodes) ? nodes : []).map(n => {
                const id = (n.id !== undefined && n.id !== null) ? String(n.id) : (n.name || n.text || Math.random().toString(36).slice(2));
                const parent = (n.parent_id === null || n.parent_id === undefined) ? '#' : String(n.parent_id);
                return {
                    id: id,
                    parent: parent,
                    text: n.text || n.name || String(id),
                    children: (n.children === true) || (n.hasOwnProperty('children') && Array.isArray(n.children) ? n.children : false),
                    li_attr: { meta: n.meta || n }
                };
            });

            // Falls kein jsTree existiert, initialisiere ihn; sonst setze die Daten neu
            const inst = $('#treeview').jstree(true);
            if (!inst) {
                $('#treeview').jstree({
                    'core': {
                        'data': jsNodes,
                        'check_callback': true
                    }
                });
            } else {
                inst.settings.core.data = jsNodes;
                inst.refresh();
            }
        })
        .catch(err => {
            console.error('Fehler beim Laden des Trees:', err);
            alert('Fehler beim Laden des Tree vom Server');
        });
}
</script>


<script>
// Erzeugt und füllt den jsTree mit einer Beispiel-Dance-Struktur.
// Wird beim ersten Laden der Seite einmalig ausgeführt.
function populateJsTree() {
    const nodes = [
        { id: 'dance-node', parent: '#', text: 'Dance', li_attr: { meta: { Set: '1C-Longwise Set' } } },
        { id: 'n1', parent: 'dance-node', text: '1cCast1p', li_attr: { meta: {} } },
        { id: 'complex-1', parent: 'dance-node', text: 'ComplexFigure', state: { opened: true }, li_attr: { meta: {} } },
        { id: 'c1', parent: 'complex-1', text: '1cRT', li_attr: { meta: {} } },
        { id: 'c2', parent: 'complex-1', text: '1cWait', li_attr: { meta: {} } },
        { id: 'n3', parent: 'dance-node', text: '6Hrb', li_attr: { meta: {} } }
    ];

    // Falls jsTree noch nicht existiert, initialisiere ihn; sonst setze die Daten neu
    const inst = $('#treeview').jstree(true);
    if (!inst) {
        $('#treeview').jstree({
            'core': {
                'data': nodes,
                'check_callback': true
            },
            'plugins': ['dnd'],
            'dnd': {
                'inside_pos': 'last',
                'check_while_dragging': true
            }
        });

        // Ermögliche das Hinzufügen externer Elemente per HTML5-Drop
        const treeEl = document.getElementById('treeview');
        treeEl.addEventListener('dragover', function(e) { e.preventDefault(); if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy'; });
        treeEl.addEventListener('drop', function(e) {
            e.preventDefault();
            const tree = $('#treeview').jstree(true);
            if (!tree) return;

            // Versuch zuerst custom MIME-Type, dann generisches JSON/Text
            const raw = e.dataTransfer.getData('application/x-figure') || e.dataTransfer.getData('application/json') || e.dataTransfer.getData('text/plain');
            if (!raw) return;
            let fig;
            try { fig = JSON.parse(raw); } catch (err) { console.warn('Drop: keine gültige JSON-Figur:', err); return; }

            // Bestimme Ziel-Node (nächstes li-Element)
            let el = e.target;
            while (el && el !== treeEl && el.tagName !== 'LI') el = el.parentNode;
            let parentId = '#';
            if (el && el !== treeEl && el.tagName === 'LI') parentId = el.id;

            const label = fig.name || fig.Name || fig.text || 'NewFigure';
            const nodeData = {
                text: label,
                li_attr: { meta: fig }
            };

            // Erstelle Knoten
            tree.create_node(parentId, nodeData, 'last', function(created) {
                // öffne Parent, falls geschlossen
                try { tree.open_node(parentId); } catch (e) {}
            });
        });

    } else {
        inst.settings.core.data = nodes;
        inst.settings.plugins = inst.settings.plugins || [];
        if (!inst.settings.plugins.includes('dnd')) inst.settings.plugins.push('dnd');
        inst.refresh();
    }
}

// Einmaliger Aufruf beim Laden der Seite
document.addEventListener('DOMContentLoaded', function() {
    populateJsTree();
});


// automatische Befüllung des Formation-Filters (wird von loadFigures aufgerufen)
function populateFormationOptions(data) {
    const select = document.getElementById('filter');
    if (!select) return;

    // Merke aktuellen Wert, damit wir ihn nach dem Neuaufbau wieder setzen können
    const previous = select.value || '';

    // Sammle eindeutige Formation-Werte in Originalschreibweise
    const formationsMap = new Map();
    data.forEach(fig => {
        const val = fig.Formation || fig.formation || fig.formationType || fig.formation_name || '';
        if (val && typeof val === 'string') {
            const key = val.toString().toLowerCase();
            if (!formationsMap.has(key)) formationsMap.set(key, val);
        }
    });

    // Entferne alte Options außer der ersten (Alle Formationen)
    while (select.options.length > 1) select.remove(1);

    // Füge gefundene Optionen sortiert hinzu
    Array.from(formationsMap.entries())
         .sort((a,b) => a[1].localeCompare(b[1]))
         .forEach(([key, original]) => {
             const opt = document.createElement('option');
             opt.value = key;
             opt.textContent = original;
             select.appendChild(opt);
         });

    // Wenn die vorher gewählte Option noch existiert, stelle sie wieder her
    if (previous) {
        const found = Array.from(select.options).some(o => o.value === previous.toString().toLowerCase());
        if (found) {
            select.value = previous.toString().toLowerCase();
        } else {
            // falls nicht vorhanden, setze auf Alle
            select.value = '';
        }
    }

    // Filter aktualisieren
    if (typeof applyFilters === 'function') applyFilters();
}

// Stellt die Karten auf der linken Seite wieder her: lädt /figures und baut die Kartelemente auf
function loadFigures() {
    fetch('/figures')
        .then(response => response.json())
        .then(data => {
            if (!Array.isArray(data)) return;
            if (typeof populateFormationOptions === 'function') populateFormationOptions(data);

            const container = document.getElementById('figure-list');
            if (!container) return;
            container.innerHTML = '';

            data.forEach(fig => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.display = 'flex';
                card.style.justifyContent = 'space-between';
                card.style.padding = '6px 8px';
                card.style.border = '1px solid #ddd';
                card.style.borderRadius = '4px';
                card.style.marginBottom = '6px';
                card.style.alignItems = 'center';

                // Formation als dataset für Filter
                const formation = fig.Formation || fig.formation || fig.formationType || fig.formation_name || '';
                card.dataset.formation = formation.toString().toLowerCase();

                // komplette Figur als data-Attribut
                try { card.dataset.full = JSON.stringify(fig); } catch (e) { card.dataset.full = '' }

                // Linker Bereich: Name + Description
                const left = document.createElement('div');
                left.style.flex = '1';
                left.style.minWidth = '0';

                const nameEl = document.createElement('strong');
                nameEl.textContent = fig.name || fig.Name || fig.text || 'Unnamed';
                nameEl.style.display = 'block';
                nameEl.style.whiteSpace = 'nowrap';
                nameEl.style.overflow = 'hidden';
                nameEl.style.textOverflow = 'ellipsis';

                const descEl = document.createElement('div');
                descEl.textContent = fig.Desc || '';
                descEl.style.fontSize = '0.9rem';
                descEl.style.color = '#444';
                // Mehrzeilige Beschreibung anzeigen, max. ~2 Zeilen mit Ellipsis
                descEl.style.display = 'block';
                descEl.style.whiteSpace = 'normal';
                descEl.style.overflow = 'hidden';
                descEl.style.textOverflow = 'ellipsis';
                descEl.style.lineHeight = '1.2';
                descEl.style.maxHeight = '2.4em';
                descEl.style.marginTop = '3px';

                left.appendChild(nameEl);
                left.appendChild(descEl);

                // Rechter Bereich: Bars
                const right = document.createElement('div');
                right.style.marginLeft = '8px';
                right.style.flex = '0 0 auto';
                const barsVal = (fig.Bars ?? fig.bars ?? fig.barsCount ?? fig.BarsCount ?? fig.bar ?? fig.Bar);
                right.textContent = (barsVal === undefined || barsVal === null || barsVal === '') ? 'Bars: —' : 'Bars: ' + barsVal;
                right.style.fontSize = '0.9rem';
                right.style.color = '#333';

                card.appendChild(left);
                card.appendChild(right);

                // draggable: erlaubt Drag von Figuren in den Tree
                card.setAttribute('draggable', 'true');
                card.addEventListener('dragstart', function(e) {
                    try {
                        e.dataTransfer.setData('application/x-figure', JSON.stringify(fig));
                        e.dataTransfer.setData('application/json', JSON.stringify(fig));
                        e.dataTransfer.effectAllowed = 'copy';
                    } catch (err) { /* ignore */ }
                });

                // Klick: markiere und zeige Details
                card.addEventListener('click', function() {
                    document.querySelectorAll('#figure-list .card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    try { displayFigureDetails(fig); } catch (e) { console.warn(e); }
                });

                container.appendChild(card);
            });

            if (typeof applyFilters === 'function') applyFilters();
        })
        .catch(err => { console.error('Fehler beim Laden der Figuren:', err); });
}

// Einfache Anzeige der vollständigen Figur im Arbeitsbereich (mittlere Spalte)
function displayFigureDetails(fig) {
    const middle = document.getElementById('middle');
    if (!middle) return;
    middle.innerHTML = '<h3>Arbeitsbereich</h3>';

    const wrap = document.createElement('div'); wrap.style.padding = '8px';
    const title = document.createElement('h4'); title.textContent = fig.name || fig.Name || fig.text || 'Unnamed';
    wrap.appendChild(title);

    const desc = document.createElement('p'); desc.textContent = fig.desc || fig.Description || fig.description || '';
    wrap.appendChild(desc);

    const pre = document.createElement('pre'); pre.textContent = JSON.stringify(fig, null, 2);
    pre.style.background = '#f7f7f7'; pre.style.padding = '8px'; pre.style.borderRadius = '4px'; pre.style.maxHeight = '240px'; pre.style.overflow = 'auto';
    wrap.appendChild(pre);

    middle.appendChild(wrap);
}

// Filter- und Suchfunktion: wendet den ausgewählten Formation-Filter und Suche auf die Cards an
function applyFilters() {
    const filterEl = document.getElementById('filter');
    const searchEl = document.getElementById('search');
    const sel = filterEl ? (filterEl.value || '').toString().toLowerCase() : '';
    const text = searchEl ? (searchEl.value || '').toString().toLowerCase() : '';

    const cards = document.querySelectorAll('#figure-list .card');
    cards.forEach(card => {
        const cardFormation = (card.dataset.formation || '').toString().toLowerCase();
        const matchesFormation = !sel || sel === cardFormation;

        const nameEl = card.querySelector('strong');
        const nameText = nameEl ? (nameEl.textContent || '').toString().toLowerCase() : '';
        const matchesText = !text || nameText.includes(text);

        const show = matchesFormation && matchesText;
        card.style.display = show ? 'flex' : 'none';
    });
}

// Registriere Event-Listener für Filter und Suche
(function registerFilterListeners(){
    const filterEl = document.getElementById('filter');
    if (filterEl) {
        filterEl.addEventListener('change', applyFilters);
        filterEl.addEventListener('input', applyFilters);
    }
    const searchEl = document.getElementById('search');
    if (searchEl) searchEl.addEventListener('input', applyFilters);

    // wende aktuellen Filter sofort an (falls schon gesetzt)
    if (typeof applyFilters === 'function') applyFilters();
})();

// Figuren direkt beim Start laden
document.addEventListener('DOMContentLoaded', loadFigures);
</script>

</body>
</html>
