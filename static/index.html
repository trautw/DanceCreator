<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DanceCreator (web)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>DanceCreator</h1>
    <div class="toolbar">
      <button id="btnAddSimple">Add Simple</button>
      <button id="btnAddComplex">Add Complex</button>
      <select id="fileList"></select>
      <button id="btnLoad">Load</button>
      <button id="btnSave">Save</button>
    </div>
  </header>

  <main>
    <div id="canvas" class="canvas" tabindex="0"></div>
  </main>

  <footer>
    <small>Rechtsklick auf eine Box für Aktionen. Drag &amp; Drop um Figuren zu verschieben.</small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
